# golangci-lint v2 configuration for auth-service
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Default
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

    # Style
    - misspell
    - revive

    # Security
    - gosec
    - gocritic

    # Performance
    - prealloc
    - bodyclose

    # Complexity
    - gocyclo
    - funlen

  settings:
    gocyclo:
      min-complexity: 15

    funlen:
      lines: 100
      statements: 60

    gosec:
      excludes:
        - G104 # Duplicates errcheck

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam # Too noisy for request/response structs

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code

    misspell:
      locale: US

  exclusions:
    rules:
      # Test files can have longer functions
      - path: _test\.go
        linters:
          - funlen
          - gocyclo

      # Test files can use dot imports for testify
      - path: _test\.go
        text: "dot-imports"

      # Package name "api" is intentional for the API layer
      - path: internal/api/
        text: "avoid meaningless package names"
        linters:
          - revive

      # Generated code
      - path: ".*\\.pb\\.go"
        linters:
          - govet
          - revive
          - gocritic

    max-issues-per-linter: 0
    max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/qf-studio/auth-service
