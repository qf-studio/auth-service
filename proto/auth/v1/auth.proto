syntax = "proto3";

package auth.v1;

option go_package = "github.com/qf-studio/auth-service/proto/auth/v1;authv1";

// AuthService provides token validation, user lookup, and permission
// checking over gRPC for internal service-to-service communication.
service AuthService {
  // ValidateToken verifies a JWT access token and returns its claims.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // GetUser retrieves a user by ID.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // CheckPermission evaluates whether a subject may perform an action on an object.
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);

  // IntrospectToken returns detailed token metadata (RFC 7662-style).
  rpc IntrospectToken(IntrospectTokenRequest) returns (IntrospectTokenResponse);
}

message ValidateTokenRequest {
  string access_token = 1;
  string tenant_id = 2;   // Optional: scope validation to a specific tenant
}

message ValidateTokenResponse {
  bool valid = 1;
  TokenClaims claims = 2;
}

message TokenClaims {
  string subject = 1;
  repeated string roles = 2;
  repeated string scopes = 3;
  string client_type = 4;
  string token_id = 5;
  int64 expires_at = 6;   // Unix timestamp
  int64 issued_at = 7;    // Unix timestamp
  string jkt_thumbprint = 8;
  repeated AuthorizationDetail authorization_details = 9;
  string tenant_id = 10;  // UUID of the tenant this token belongs to
}

// AuthorizationDetail represents a single RFC 9396 authorization_details entry.
message AuthorizationDetail {
  string type = 1;
  repeated string locations = 2;
  repeated string actions = 3;
  repeated string datatypes = 4;
  string identifier = 5;
}

message GetUserRequest {
  string user_id = 1;
  string tenant_id = 2;   // Scope user lookup to a specific tenant
}

message GetUserResponse {
  User user = 1;
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  repeated string roles = 4;
  bool locked = 5;
  bool email_verified = 6;
  int64 created_at = 7;   // Unix timestamp
  int64 updated_at = 8;   // Unix timestamp
  string tenant_id = 9;   // UUID of the tenant this user belongs to
}

message CheckPermissionRequest {
  string subject = 1;
  string object = 2;
  string action = 3;
  string tenant_id = 4;   // Scope permission check to a specific tenant
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message IntrospectTokenRequest {
  string access_token = 1;
  string tenant_id = 2;   // Optional: scope introspection to a specific tenant
}

message IntrospectTokenResponse {
  bool active = 1;
  TokenClaims claims = 2;
}
