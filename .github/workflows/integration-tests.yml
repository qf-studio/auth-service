name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # GHA service containers as fallback — testcontainers-go will spin its own
    # containers via Docker socket, but these services ensure connectivity even
    # if testcontainers has issues (e.g., DinD restrictions).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d auth_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Build (verify compilation)
        run: go build ./...

      - name: Run integration tests
        env:
          # Expose service container addresses for fallback use
          TEST_POSTGRES_HOST: localhost
          TEST_POSTGRES_PORT: 5432
          TEST_POSTGRES_DB: auth_test
          TEST_POSTGRES_USER: test
          TEST_POSTGRES_PASSWORD: test
          TEST_REDIS_HOST: localhost
          TEST_REDIS_PORT: 6379
          # testcontainers-go uses the Docker socket directly on ubuntu runners
          TESTCONTAINERS_RYUK_DISABLED: "false"
        run: >-
          go test
          -tags=integration
          -race
          -timeout 10m
          -count=1
          -v
          ./...
